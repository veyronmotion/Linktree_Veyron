    .bg-photo::after {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(to right,  rgba(2,7,14,0.0) 0%, rgba(2,7,14,0.45) 50%, rgba(2,7,14,0.88) 100%),
        linear-gradient(to bottom, rgba(2,7,14,0.0) 0%, rgba(2,7,14,0.3)  45%, rgba(2,7,14,0.95) 100%);
    }

    .grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 2; opacity: 0.4;
    }

    .container {
      position: relative; z-index: 3;
      max-width: 460px; margin: 0 auto;
      padding: 60px 22px 80px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* === AVATAR === */
    .avatar-wrap {
      position: relative; margin-bottom: 22px;
      animation: fadeDown 0.85s cubic-bezier(.22,1,.36,1) both;
    }
    .avatar-glow {
      position: absolute; inset: -14px; border-radius: 50%;
      background: radial-gradient(circle, rgba(26,143,255,0.18) 0%, transparent 70%);
      animation: pulse 3.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.08); }
    }
    .avatar-ring { width: 116px; height: 116px; border-radius: 50%; position: relative; }
    .avatar-ring::before {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: conic-gradient(from 0deg, var(--electric), var(--chrome-3), rgba(26,143,255,0.3), var(--electric));
      animation: spin 5s linear infinite; z-index: -1;
    }
    .avatar-ring::after {
      content: ''; position: absolute; inset: -10px; border-radius: 50%;
      background: conic-gradient(from 180deg, transparent 55%, rgba(26,143,255,0.14) 80%, transparent 100%);
      animation: spin 5s linear infinite reverse; z-index: -2;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-inner {
      width: 116px; height: 116px; border-radius: 50%;
      overflow: hidden; border: 2px solid rgba(2,7,14,0.8);
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }

    /* === NAME === */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 4.5rem);
      letter-spacing: 0.18em; line-height: 1; text-align: center;
      background: linear-gradient(135deg, var(--chrome-2) 0%, var(--chrome-3) 30%, var(--electric) 50%, var(--chrome-3) 70%, var(--chrome-1) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 5s linear infinite, flicker 8s ease-in-out infinite, fadeDown 0.85s 0.1s cubic-bezier(.22,1,.36,1) both;
      filter: drop-shadow(0 0 22px rgba(26,143,255,0.32));
      margin-bottom: 4px;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    @keyframes flicker {
      0%,100%  { filter: drop-shadow(0 0 22px rgba(26,143,255,0.32)); }
      91%      { filter: drop-shadow(0 0 22px rgba(26,143,255,0.32)); }
      92%      { filter: drop-shadow(0 0  6px rgba(26,143,255,0.1));  }
      93%      { filter: drop-shadow(0 0 22px rgba(26,143,255,0.32)); }
      96%      { filter: drop-shadow(0 0 22px rgba(26,143,255,0.32)); }
      97%      { filter: drop-shadow(0 0  4px rgba(26,143,255,0.08)); }
      98%      { filter: drop-shadow(0 0 28px rgba(26,143,255,0.45)); }
      99%      { filter: drop-shadow(0 0 22px rgba(26,143,255,0.32)); }
    }

    .handle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.25em;
      color: var(--chrome-2); opacity: 0.55;
      margin-bottom: 10px;
      animation: fadeDown 0.85s 0.14s cubic-bezier(.22,1,.36,1) both;
    }

    .tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.38em; text-transform: uppercase;
      color: #ffffff; opacity: 1;
      margin-bottom: 40px;
      text-shadow: 0 0 18px rgba(255,255,255,0.22);
      animation: fadeDown 0.85s 0.18s cubic-bezier(.22,1,.36,1) both;
    }

    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, var(--electric), var(--chrome-2), var(--electric), transparent);
      margin-bottom: 36px; opacity: 0.3;
      animation: fadeDown 0.85s 0.25s cubic-bezier(.22,1,.36,1) both;
    }

    /* === SECTION LABEL === */
    .section-label {
      width: 100%; display: flex; align-items: center; gap: 12px;
      margin: 26px 0 12px;
    }
    .section-label span {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.75rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: #ffffff; white-space: nowrap;
    }
    .section-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.25), transparent);
    }

    /* === LINKS === */
    .links { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .link-btn {
      position: relative;
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 16px 20px;
      text-decoration: none; color: var(--white);
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 24px rgba(0,0,0,0.28);
      overflow: hidden;
      transition: border-color 0.28s ease, transform 0.28s ease, box-shadow 0.28s ease;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) forwards;
    }
    .links > *:nth-child(1)  { animation-delay: 0.30s; }
    .links > *:nth-child(2)  { animation-delay: 0.42s; }
    .links > *:nth-child(3)  { animation-delay: 0.54s; }
    .links > *:nth-child(4)  { animation-delay: 0.66s; }
    .links > *:nth-child(5)  { animation-delay: 0.78s; }
    .links > *:nth-child(6)  { animation-delay: 0.90s; }
    .links > *:nth-child(7)  { animation-delay: 1.02s; }
    .links > *:nth-child(8)  { animation-delay: 1.14s; }

    .link-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(26,143,255,0.06) 60%, transparent 80%);
      opacity: 0; transition: opacity 0.35s;
    }
    .link-btn:hover {
      border-color: var(--glass-border-h);
      transform: translateY(-2px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 32px rgba(26,143,255,0.1), 0 2px 8px rgba(0,0,0,0.4);
    }
    .link-btn:hover::before { opacity: 1; }

    /* featured Collemoi */
    .link-btn.featured {
      background: var(--glass-featured);
      border-color: rgba(26,143,255,0.28);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.09),
        0 0 0 1px rgba(26,143,255,0.08),
        0 6px 30px rgba(26,143,255,0.12),
        0 4px 16px rgba(0,0,0,0.35);
      padding: 20px 20px;
    }
    .link-btn.featured:hover {
      border-color: rgba(26,143,255,0.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 0 0 1px rgba(26,143,255,0.15),
        0 10px 40px rgba(26,143,255,0.18),
        0 4px 12px rgba(0,0,0,0.45);
    }

    /* icon box */
    .link-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: rgba(26,143,255,0.09);
      border: 1px solid rgba(26,143,255,0.16);
      border-radius: 9px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
      overflow: hidden;
      transition: background 0.28s;
    }
    /* logo images fill the icon box neatly */
    .link-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* TikTok logo has black bg — match the card */
    .link-icon.tt-icon {
      background: #000;
      border-color: rgba(255,255,255,0.1);
      border-radius: 9px;
    }
    .link-btn:hover .link-icon { background: rgba(26,143,255,0.16); }
    .link-btn:hover .link-icon.tt-icon { background: #111; }

    .link-btn.featured .link-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(26,143,255,0.12);
      border-color: rgba(26,143,255,0.24);
    }

    .link-text { flex: 1; }
    .link-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.57rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--electric); opacity: 0.75;
      display: block; margin-bottom: 2px;
    }
    .link-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600; font-size: 1.05rem; letter-spacing: 0.07em;
      color: var(--chrome-3);
    }
    .link-btn.featured .link-title { font-size: 1.1rem; }

    .promo-wrap { display: flex; align-items: center; gap: 8px; margin-top: 7px; flex-wrap: wrap; }
    .promo-discount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem; letter-spacing: 0.12em;
      color: var(--electric);
      filter: drop-shadow(0 0 8px rgba(26,143,255,0.55));
    }
    .promo-code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.18em; color: #ffffff;
      background: rgba(26,143,255,0.18);
      border: 1px solid rgba(26,143,255,0.38);
      border-radius: 5px; padding: 3px 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), 0 0 12px rgba(26,143,255,0.18);
    }

    .link-arrow {
      font-size: 0.78rem; color: var(--chrome-2);
      opacity: 0; transform: translateX(-5px); transition: all 0.28s;
    }
    .link-btn:hover .link-arrow { opacity: 1; transform: translateX(0); }

    .mail-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: rgba(26,143,255,0.09);
      border: 1px solid rgba(26,143,255,0.16);
      border-radius: 9px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
      transition: background 0.28s;
    }
    .link-btn:hover .mail-icon { background: rgba(26,143,255,0.16); }

    .footer {
      margin-top: 52px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem; letter-spacing: 0.32em;
      color: var(--chrome-2); opacity: 0.2; text-align: center;
      animation: fadeUp 0.6s 1.2s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }

    .corner { position:fixed; width:34px; height:34px; pointer-events:none; z-index:4; opacity:0.2; }
    .corner-tl { top:14px;left:14px;     border-top:1px solid var(--electric); border-left:1px solid var(--electric); }
    .corner-tr { top:14px;right:14px;    border-top:1px solid var(--electric); border-right:1px solid var(--electric); }
    .corner-bl { bottom:14px;left:14px;  border-bottom:1px solid var(--electric); border-left:1px solid var(--electric); }
    .corner-br { bottom:14px;right:14px; border-bottom:1px solid var(--electric); border-right:1px solid var(--electric); }

    body::after {
      content: ''; position:fixed; top:-20%; left:50%; transform:translateX(-50%);
      width:1px; height:65%;
      background:linear-gradient(to bottom, transparent, rgba(26,143,255,0.18), transparent);
      filter:blur(10px); animation:beam 7s ease-in-out infinite;
      pointer-events:none; z-index:1;
    }
    @keyframes beam {
      0%,100% { opacity:0.2; transform:translateX(-50%) scaleX(1); }
      50%      { opacity:0.45; transform:translateX(-50%) scaleX(2.5); }
    }
  </style>
</head>
